<h2 mat-dialog-title>Delete</h2>

<mat-dialog-content>
  Are you sure you want to {{ name }}?
</mat-dialog-content>

<mat-dialog-actions>
  <button class="btn-custom btn-secondary btn-sm" (click)="onNo()">No</button>
  <button class="btn-custom btn-danger btn-sm" (click)="onYes()">Yes</button>
</mat-dialog-actions>
